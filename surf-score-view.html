<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d1f3c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="apple-touch-icon.png">
<title>SDSC Surf · Live Score</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');
:root{
  --navy:#0d1f3c;--navy-card:#0a1a33;
  --surf-blue:#2561c4;--blue-acc:#1e4d9a;
  --white:#ffffff;--off-white:#dce8ff;--muted:#7a9cc8;
  --gold:#e8b84b;--red:#e03535;--success:#3dd68c;
  --yellow-card:#f5c518;--red-card:#e03030;
}
*{margin:0;padding:0;box-sizing:border-box}
html{background:var(--navy);min-height:100%}
body{font-family:'Inter',sans-serif;color:var(--white);min-height:100vh;overflow-x:hidden}

html::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:linear-gradient(175deg,#1a3a6e 0%,#0d1f3c 45%,#071428 100%)}
html::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(255,255,255,.012) 39px,rgba(255,255,255,.012) 40px)}

/* White/grey waves */
.wave-bg{position:fixed;bottom:0;left:0;right:0;z-index:0;pointer-events:none;height:140px;overflow:hidden}
.wave-bg svg{position:absolute;bottom:0;width:200%;animation:waveScroll 20s linear infinite}
.wave-bg svg:nth-child(2){animation-duration:28s;animation-direction:reverse;opacity:.5}
.wave-bg svg:nth-child(3){animation-duration:36s;opacity:.25}
@keyframes waveScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* Broadcast: full width, centered, no phone constraint */
.app{position:relative;z-index:1;max-width:680px;margin:0 auto;padding-bottom:52px}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;padding:40px 32px 18px}
.brand-top{font-family:'Oswald',sans-serif;font-size:10px;font-weight:500;letter-spacing:3.5px;text-transform:uppercase;color:var(--gold);opacity:.85}
.brand-name{font-family:'Oswald',sans-serif;font-size:34px;font-weight:700;letter-spacing:1px;color:var(--white);line-height:1.1}
.brand-name em{font-style:normal;color:var(--gold)}
.sync-wrap{position:relative;display:flex;align-items:center}
.sync-ring{position:absolute;inset:-6px;border-radius:50px;border:1.5px solid transparent}
.sync-wrap.live .sync-ring{border-color:rgba(61,214,140,.45);animation:ringBreath 2s ease-in-out infinite}
@keyframes ringBreath{0%,100%{opacity:.35;transform:scale(1)}50%{opacity:1;transform:scale(1.06)}}
.sync-pill{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:6px 14px;font-size:11px;font-weight:600;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;transition:all .3s}
.sync-wrap.live .sync-pill{color:var(--success);border-color:rgba(61,214,140,.3);background:rgba(61,214,140,.09)}
.sync-wrap.error .sync-pill{color:var(--red);border-color:rgba(224,53,53,.3)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:currentColor}
.sync-wrap.live .sync-dot{animation:dotPulse 1.8s infinite}
@keyframes dotPulse{0%,100%{opacity:1}50%{opacity:.2}}

/* VIEW BADGE */
.view-badge{display:flex;align-items:center;justify-content:center;gap:8px;margin:0 32px 18px;background:rgba(232,184,75,.07);border:1px solid rgba(232,184,75,.2);border-radius:12px;padding:9px 20px;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--gold)}

/* LOADING */
.loading-state{text-align:center;padding:80px 20px;color:var(--muted);font-size:14px}
.loading-state span{font-size:36px;display:block;margin-bottom:14px}

/* SCOREBOARD */
.scoreboard{margin:0 32px 18px;background:rgba(10,26,51,.85);border:1px solid rgba(255,255,255,.16);border-radius:28px;overflow:hidden;box-shadow:0 28px 72px rgba(0,0,0,.65),inset 0 1px 0 rgba(255,255,255,.1)}
.match-header{display:flex;justify-content:space-between;align-items:center;padding:12px 24px;background:linear-gradient(90deg,#1e4d9a,#162d57);border-bottom:1px solid rgba(255,255,255,.1)}
.match-league{font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--gold)}
.match-half{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.55)}

.scores-row{display:grid;grid-template-columns:1fr 80px 1fr;align-items:start;padding:28px 24px 20px;gap:12px}
.team-col{text-align:center;width:100%}
.team-name-display{font-family:'Oswald',sans-serif;font-size:22px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--white);margin-bottom:10px;line-height:1.1}
.score-wrap{position:relative;display:inline-block}
.score-num{font-family:'Oswald',sans-serif;font-size:128px;font-weight:700;line-height:1;color:var(--white);transition:color .25s}
.score-num.leading{color:var(--gold);text-shadow:0 0 50px rgba(232,184,75,.4)}
.score-num.losing{color:var(--muted)}
.score-num.bump{animation:scorePop .4s cubic-bezier(.36,.07,.19,.97) forwards}
@keyframes scorePop{0%{transform:scale(1)}35%{transform:scale(1.22)}65%{transform:scale(.97)}100%{transform:scale(1)}}
.score-ring{position:absolute;inset:-10px;border-radius:50%;border:3px solid var(--gold);opacity:0;pointer-events:none}
.score-ring.fire{animation:ringPop .6s ease-out forwards}
@keyframes ringPop{0%{opacity:.9;transform:scale(.6)}100%{opacity:0;transform:scale(1.9)}}
.score-sep{font-family:'Oswald',sans-serif;font-size:52px;font-weight:300;color:rgba(255,255,255,.25);text-align:center;line-height:1;padding-top:36px;align-self:start}

/* Shots */
.shots-info{font-size:13px;color:var(--muted);margin-top:5px;min-height:20px}
.shots-info strong{color:var(--white);font-weight:600}

/* Cards */
.cards-info{display:flex;justify-content:center;gap:8px;margin-top:8px;min-height:28px;flex-wrap:wrap}
.card-badge{display:flex;align-items:center;gap:4px;padding:4px 12px;border-radius:7px;font-size:13px;font-weight:700}
.cb-yellow{background:var(--yellow-card);color:#1a1200}
.cb-red{background:var(--red-card);color:white}

/* TIMER */
.timer-card{margin:0 32px 18px;background:rgba(10,26,51,.85);border:1px solid rgba(255,255,255,.16);border-radius:24px;padding:24px 32px;box-shadow:0 8px 32px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.08);text-align:center}
.timer-label-text{font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.timer-digits{font-family:'Oswald',sans-serif;font-size:100px;font-weight:700;letter-spacing:6px;line-height:1;color:var(--white);transition:color .3s}
.timer-digits.warning{color:var(--gold)}
.timer-digits.urgent{color:var(--red);animation:flash 1s infinite}
.timer-digits.final{color:var(--white);animation:none;font-size:64px;letter-spacing:6px}
@keyframes flash{0%,100%{opacity:1}50%{opacity:.45}}

/* GOALS */
.section{margin:0 32px 18px}
.sec-label{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;padding-left:2px}
.goals-card{background:rgba(10,26,51,.8);border:1px solid rgba(255,255,255,.1);border-radius:22px;overflow:hidden}
.goal-item{display:flex;align-items:center;gap:14px;padding:14px 22px;border-bottom:1px solid rgba(255,255,255,.06);animation:fadeSlide .4s ease}
@keyframes fadeSlide{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.goal-item:last-child{border-bottom:none}
.goal-badge{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.goal-badge.ours{background:rgba(37,97,196,.4)}
.goal-badge.theirs{background:rgba(255,255,255,.1)}
.goal-info{flex:1;min-width:0}
.goal-scorer{font-size:16px;font-weight:600;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.goal-team{font-size:12px;color:var(--muted);margin-top:2px}
.goal-time{font-family:'Oswald',sans-serif;font-size:17px;color:var(--gold);letter-spacing:.5px;flex-shrink:0}
.empty-goals{text-align:center;padding:34px 20px;color:var(--muted);font-size:14px;line-height:1.7}
.empty-goals span{font-size:30px;display:block;margin-bottom:8px}

/* HALFTIME OVERLAY */
.halftime-overlay{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(6,14,32,.94);backdrop-filter:blur(20px);opacity:0;pointer-events:none;transition:opacity .4s}
.halftime-overlay.show{opacity:1;pointer-events:auto}
.ht-label{font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:5px;text-transform:uppercase;color:var(--gold);opacity:.85;margin-bottom:16px;animation:htUp .6s ease .2s both}
.ht-banner{font-family:'Oswald',sans-serif;font-size:64px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--white);margin-bottom:24px;animation:htUp .6s ease .35s both}
.ht-score{font-family:'Oswald',sans-serif;font-size:110px;font-weight:700;color:var(--white);letter-spacing:10px;animation:htUp .6s ease .5s both;line-height:1}
.ht-teams{font-family:'Oswald',sans-serif;font-size:18px;letter-spacing:2px;color:var(--muted);margin-top:10px;animation:htUp .6s ease .6s both}
@keyframes htUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

/* GOAL FLASH + CONFETTI */
.goal-flash{position:fixed;inset:0;z-index:250;pointer-events:none;opacity:0}
.goal-flash.fire{animation:flashBurst .5s ease-out forwards}
@keyframes flashBurst{0%{opacity:.55;background:radial-gradient(circle,rgba(232,184,75,.4) 0%,transparent 70%)}100%{opacity:0}}
canvas#confetti{position:fixed;inset:0;z-index:249;pointer-events:none}

.footer-mark{text-align:center;padding:4px 0;font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.14)}
</style>
</head>
<body>

<div class="wave-bg">
  <svg viewBox="0 0 1440 100" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" style="height:100px">
    <path d="M0,50 C180,90 360,15 540,55 C720,95 900,15 1080,55 C1260,95 1360,35 1440,55 L1440,100 L0,100Z" fill="rgba(255,255,255,0.07)"/>
  </svg>
  <svg viewBox="0 0 1440 100" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" style="height:80px">
    <path d="M0,35 C200,75 400,8 600,45 C800,82 1000,12 1200,50 C1320,72 1380,30 1440,42 L1440,100 L0,100Z" fill="rgba(220,232,255,0.05)"/>
  </svg>
  <svg viewBox="0 0 1440 100" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" style="height:65px">
    <path d="M0,60 C160,25 320,80 480,48 C640,16 800,72 960,44 C1120,16 1280,62 1440,48 L1440,100 L0,100Z" fill="rgba(200,220,255,0.04)"/>
  </svg>
</div>

<div class="goal-flash" id="goalFlash"></div>
<canvas id="confetti"></canvas>

<div class="halftime-overlay" id="htOverlay">
  <div class="ht-label">SDSC Surf</div>
  <div class="ht-banner" id="htBanner">HALF TIME</div>
  <div class="ht-score" id="htScore">0 : 0</div>
  <div class="ht-teams" id="htTeams">SDSC SURF vs OPPONENT</div>
</div>

<div class="app">
  <div class="header">
    <div class="brand">
      <div class="brand-top">Boys · Live</div>
      <div class="brand-name">SDSC <em>Surf</em></div>
    </div>
    <div class="sync-wrap" id="syncWrap">
      <div class="sync-ring"></div>
      <div class="sync-pill"><div class="sync-dot"></div><span id="syncLabel">SYNC…</span></div>
    </div>
  </div>

  <div class="view-badge">👁 Live View · Read Only</div>
  <div class="loading-state" id="loadingState"><span>⚽</span>Waiting for match data…</div>

  <div id="mainContent" style="display:none">
    <div class="scoreboard">
      <div class="match-header">
        <div class="match-league">SDSC Surf · Live Score</div>
        <div class="match-half" id="halfBadge">1ST HALF</div>
      </div>
      <div class="scores-row">
        <div class="team-col">
          <div class="team-name-display" id="homeLabel">SDSC Surf</div>
          <div class="score-wrap">
            <div class="score-num" id="homeScore">0</div>
            <div class="score-ring" id="homeRing"></div>
          </div>
          <div class="shots-info" id="homeShots"></div>
          <div class="cards-info" id="homeCards"></div>
        </div>
        <div class="score-sep">:</div>
        <div class="team-col">
          <div class="team-name-display" id="awayLabel">Opponent</div>
          <div class="score-wrap">
            <div class="score-num" id="awayScore">0</div>
            <div class="score-ring" id="awayRing"></div>
          </div>
          <div class="shots-info" id="awayShots"></div>
          <div class="cards-info" id="awayCards"></div>
        </div>
      </div>
    </div>

    <div class="timer-card">
      <div class="timer-label-text" id="timerHalfLabel">1ST HALF</div>
      <div class="timer-digits" id="timerDigits">30:00</div>
    </div>

    <div class="section">
      <div class="sec-label">Goals Scored</div>
      <div class="goals-card" id="goalsList">
        <div class="empty-goals"><span>⚽</span>No goals yet</div>
      </div>
    </div>

    <div class="footer-mark">SDSC Surf · Live Score</div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

const FB={
  apiKey:"AIzaSyADA83VqTnTZYawJZEdnAMNzVOgq92PodQ",
  authDomain:"surf-score-2.firebaseapp.com",
  databaseURL:"https://surf-score-2-default-rtdb.firebaseio.com",
  projectId:"surf-score-2",
  storageBucket:"surf-score-2.firebasestorage.app",
  messagingSenderId:"1066375405954",
  appId:"1:1066375405954:web:552acd57a7d66243806f9b"
};

/* Realtime Database never stores null or empty values, so incoming snapshots
   are merged over these defaults — an absent key means "reset to default". */
const DEFAULT_STATE={
  homeScore:0,awayScore:0,goals:[],half:1,halfMinutes:30,timerSec:1800,
  timerRunning:false,timerStartWall:null,timerSecAtStart:null,countUp:false,elapsedSec:0,
  homeTeam:'SDSC Surf',awayTeam:'Opponent',
  homeShots:0,awayShots:0,
  homeYellow:0,homeRed:0,awayYellow:0,awayRed:0,
  gameFinal:false,stoppageSec:0,timerOwner:null
};
let S=null,prevHome=0,prevAway=0,prevHalf=1,viewTicker=null,serverOffset=0;

const fbApp=initializeApp(FB);
const db=getDatabase(fbApp);
const gameRef=ref(db,'surfmatchday/game');

setSyncStatus('connecting');
/* All devices agree on time via Firebase's measured clock offset */
function serverNow(){return Date.now()+serverOffset;}
onValue(ref(db,'.info/serverTimeOffset'),snap=>{serverOffset=snap.val()||0;});
/* Drive the sync pill from the real connection state — data snapshots keep
   firing from local cache while offline, so they can't be trusted for this. */
onValue(ref(db,'.info/connected'),snap=>{setSyncStatus(snap.val()?'live':'offline');});
onValue(gameRef,snap=>{
  const raw=snap.val();
  if(!raw)return;
  const d={...DEFAULT_STATE,goals:[],...raw};
  document.getElementById('loadingState').style.display='none';
  document.getElementById('mainContent').style.display='';

  const halfChanged=S&&d.half!==prevHalf;
  const justFinal=S&&!S.gameFinal&&d.gameFinal;
  if(S&&d.homeScore>prevHome)fireGoalCelebration('home');
  if(S&&d.awayScore>prevAway)fireGoalCelebration('away');
  if(halfChanged)showHalftimeOverlay(d);
  if(justFinal)showFinalOverlay(d);

  prevHome=d.homeScore;prevAway=d.awayScore;prevHalf=d.half;
  S=d;syncClockFromWall();renderAll();

  /* Wall-clock based smooth timer for viewer — display only, never pushed */
  if(S.timerRunning&&!viewTicker){
    viewTicker=setInterval(()=>{
      if(!S||!S.timerRunning){clearInterval(viewTicker);viewTicker=null;return;}
      syncClockFromWall();
      renderTimerOnly();
    },1000);
  } else if(!S.timerRunning&&viewTicker){
    clearInterval(viewTicker);viewTicker=null;
  }
},()=>setSyncStatus('error'));

function syncClockFromWall(){
  if(!S||!S.timerRunning||!S.timerStartWall)return;
  const elapsed=Math.floor((serverNow()-S.timerStartWall)/1000);
  if(S.countUp)S.elapsedSec=Math.max(0,elapsed);
  else if(S.timerSecAtStart!=null)S.timerSec=Math.max(0,S.timerSecAtStart-elapsed);
}
/* Re-derive the clock the moment the tab becomes visible again — background
   tabs throttle timers, and this snaps the display back to the true time. */
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'){syncClockFromWall();renderTimerOnly();}
});

function setSyncStatus(s){
  const w=document.getElementById('syncWrap'),l=document.getElementById('syncLabel');
  w.className='sync-wrap';
  if(s==='live'){w.classList.add('live');l.textContent='LIVE';}
  else if(s==='offline'){w.classList.add('error');l.textContent='OFFLINE';}
  else if(s==='error'){w.classList.add('error');l.textContent='ERROR';}
  else{l.textContent='SYNC…';}
}
function fireGoalCelebration(team){
  const ring=document.getElementById(team==='home'?'homeRing':'awayRing');
  ring.classList.add('fire');setTimeout(()=>ring.classList.remove('fire'),600);
  document.getElementById('goalFlash').classList.add('fire');
  setTimeout(()=>document.getElementById('goalFlash').classList.remove('fire'),500);
  launchConfetti();
}
function showHalftimeOverlay(d){
  document.getElementById('htBanner').textContent=(d.half||1)===2?'HALF TIME':'2ND HALF';
  document.getElementById('htScore').textContent=`${d.homeScore||0} : ${d.awayScore||0}`;
  document.getElementById('htTeams').textContent=`${(d.homeTeam||'SDSC SURF').toUpperCase()} vs ${(d.awayTeam||'OPPONENT').toUpperCase()}`;
  const ov=document.getElementById('htOverlay');
  ov.classList.add('show');setTimeout(()=>ov.classList.remove('show'),6000);
}
function showFinalOverlay(d){
  document.getElementById('htBanner').textContent='FULL TIME';
  document.getElementById('htScore').textContent=`${d.homeScore||0} : ${d.awayScore||0}`;
  document.getElementById('htTeams').textContent=`${(d.homeTeam||'SDSC SURF').toUpperCase()} vs ${(d.awayTeam||'OPPONENT').toUpperCase()}`;
  const ov=document.getElementById('htOverlay');
  ov.classList.add('show');setTimeout(()=>ov.classList.remove('show'),8000);
}
function renderTimerOnly(){
  if(!S)return;
  const el=document.getElementById('timerDigits');
  // FINAL: manually ended OR countdown at zero at end of 2nd half
  if(S.gameFinal||(!S.countUp&&S.timerSec<=0&&S.half===2&&!S.timerRunning)){
    el.textContent='FULL TIME';el.className='timer-digits final';return;
  }
  if(S.countUp){
    const sec=S.elapsedSec||0,m=Math.floor(sec/60),s=sec%60;
    el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    el.className='timer-digits'+(sec>=S.halfMinutes*60?' warning':'');
    return;
  }
  const sec=S.timerSec??0,m=Math.floor(sec/60),s=sec%60;
  el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  el.className='timer-digits';
  if(sec<=60)el.classList.add('urgent');
  else if(sec<=300)el.classList.add('warning');
}
function esc(t){return String(t).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function renderAll(){
  if(!S)return;
  const h=S.homeScore||0,a=S.awayScore||0;
  const hEl=document.getElementById('homeScore'),aEl=document.getElementById('awayScore');
  hEl.textContent=h;aEl.textContent=a;
  hEl.className='score-num'+(h>a?' leading':h<a?' losing':'');
  aEl.className='score-num'+(a>h?' leading':a<h?' losing':'');
  document.getElementById('homeLabel').textContent=(S.homeTeam||'SDSC Surf').toUpperCase();
  document.getElementById('awayLabel').textContent=(S.awayTeam||'Opponent').toUpperCase();
  const half=S.half||1;
  const lbl=S.gameFinal?'FINAL':(half===1?'1ST HALF':'2ND HALF');
  document.getElementById('halfBadge').textContent=lbl;
  document.getElementById('timerHalfLabel').textContent=lbl;
  renderTimerOnly();

  // Shots
  const hs=S.homeShots||0,as=S.awayShots||0;
  document.getElementById('homeShots').innerHTML=hs>0?`<strong>${hs}</strong> shots on goal`:'';
  document.getElementById('awayShots').innerHTML=as>0?`<strong>${as}</strong> shots on goal`:'';

  // Cards
  function cardsHtml(y,r){
    let h='';
    if(y>0)h+=`<div class="card-badge cb-yellow">🟨 ${y}</div>`;
    if(r>0)h+=`<div class="card-badge cb-red">🟥 ${r}</div>`;
    return h;
  }
  document.getElementById('homeCards').innerHTML=cardsHtml(S.homeYellow||0,S.homeRed||0);
  document.getElementById('awayCards').innerHTML=cardsHtml(S.awayYellow||0,S.awayRed||0);

  // Goals
  const goals=S.goals||[];
  const list=document.getElementById('goalsList');
  if(!goals.length){list.innerHTML='<div class="empty-goals"><span>⚽</span>No goals yet</div>';return;}
  list.innerHTML=[...goals].reverse().map(g=>`
    <div class="goal-item">
      <div class="goal-badge ${g.team==='home'?'ours':'theirs'}">${g.team==='home'?'⚽':'🔵'}</div>
      <div class="goal-info">
        <div class="goal-scorer">${esc(g.scorer)}</div>
        <div class="goal-team">${esc(g.team==='home'?(S.homeTeam||'SDSC Surf'):(S.awayTeam||'Opponent'))}</div>
      </div>
      <div class="goal-time">${esc(g.time)}</div>
    </div>`).join('');
}
function launchConfetti(){
  const canvas=document.getElementById('confetti');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const colors=['#e8b84b','#ffffff','#2561c4','#3dd68c','#dce8ff'];
  const particles=Array.from({length:100},()=>({
    x:Math.random()*canvas.width,y:Math.random()*canvas.height*.35,
    vx:(Math.random()-.5)*10,vy:Math.random()*5+2,size:Math.random()*8+3,
    color:colors[Math.floor(Math.random()*colors.length)],
    rot:Math.random()*360,rotV:(Math.random()-.5)*10,alpha:1,shape:Math.random()>.5?'rect':'circle'
  }));
  let frame=0;
  (function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.vy+=.18;p.rot+=p.rotV;p.alpha-=.011;
      if(p.alpha<=0)return;
      ctx.save();ctx.globalAlpha=p.alpha;ctx.fillStyle=p.color;
      ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
      if(p.shape==='rect')ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*.6);
      else{ctx.beginPath();ctx.arc(0,0,p.size/2,0,Math.PI*2);ctx.fill();}
      ctx.restore();
    });
    if(++frame<130)requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  })();
}
