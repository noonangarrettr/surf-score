<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>SDSC Surf · Live Score</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');
:root{
  --navy:#0a1628;--navy-mid:#0f2040;--navy-lt:#162d57;--navy-card:#0d1e3a;
  --blue-acc:#1e4d9a;--surf-blue:#2561c4;--white:#f4f7ff;--off-white:#c8d4ec;
  --gold:#e8b84b;--red:#d94040;--success:#3dd68c;--muted:#5a7aaa;
  --yellow-card:#f5c518;--red-card:#e03030;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{font-family:'Inter',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;overflow-x:hidden}

/* WAVE BG */
.wave-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.wave-bg svg{position:absolute;bottom:0;width:200%;animation:waveScroll 18s linear infinite}
.wave-bg svg:nth-child(2){animation-duration:24s;animation-direction:reverse;opacity:.5}
.wave-bg svg:nth-child(3){animation-duration:30s;opacity:.3}
@keyframes waveScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.wave-top{position:fixed;top:0;left:0;right:0;height:380px;background:linear-gradient(160deg,#1a4a96 0%,#0a1628 65%);clip-path:ellipse(130% 100% at 50% 0%);z-index:0;pointer-events:none}
.grid-lines{position:fixed;inset:0;z-index:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(255,255,255,.015) 39px,rgba(255,255,255,.015) 40px)}

/* PITCH OVERLAY */
.pitch-overlay{position:fixed;inset:0;z-index:0;pointer-events:none;display:flex;align-items:center;justify-content:center;opacity:.025}
.pitch-overlay svg{width:75%;max-width:700px}

.app{position:relative;z-index:1;padding-bottom:48px;max-width:720px;margin:0 auto}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;padding:40px 32px 20px}
.brand-top{font-family:‘Oswald’,sans-serif;font-size:11px;font-weight:500;letter-spacing:3.5px;text-transform:uppercase;color:var(–gold);opacity:.8}
.brand-name{font-family:‘Oswald’,sans-serif;font-size:34px;font-weight:700;letter-spacing:1px;color:var(–white);line-height:1.1}
.brand-name span{color:var(–gold)}

/* LIVE BADGE */
.live-badge{display:flex;align-items:center;gap:8px}
.live-dot-wrap{position:relative;width:14px;height:14px}
.live-dot{width:10px;height:10px;border-radius:50%;background:var(–red);position:absolute;top:2px;left:2px}
.live-ring{position:absolute;inset:0;border-radius:50%;border:2px solid var(–red);opacity:0;animation:liveRingPulse 2s ease-out infinite}
.live-ring2{animation-delay:.6s}
@keyframes liveRingPulse{0%{opacity:.8;transform:scale(.5)}100%{opacity:0;transform:scale(1.8)}}
.live-text{font-family:‘Oswald’,sans-serif;font-size:13px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(–red)}

/* SYNC PILL */
.sync-wrap{position:relative;display:flex;align-items:center}
.sync-ring{position:absolute;inset:-6px;border-radius:50px;border:1.5px solid transparent}
.sync-wrap.live .sync-ring{border-color:rgba(61,214,140,.4);animation:ringBreath 2s ease-in-out infinite}
@keyframes ringBreath{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
.sync-pill{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:6px 14px;font-size:11px;font-weight:600;letter-spacing:1.5px;color:var(–muted);text-transform:uppercase;transition:all .3s}
.sync-wrap.live .sync-pill{color:var(–success);border-color:rgba(61,214,140,.3);background:rgba(61,214,140,.08)}
.sync-wrap.error .sync-pill{color:var(–red);border-color:rgba(217,64,64,.3)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:currentColor}
.sync-wrap.live .sync-dot{animation:dotPulse 1.8s infinite}
@keyframes dotPulse{0%,100%{opacity:1}50%{opacity:.2}}

/* META + VIEW BADGE */
.top-bar{display:flex;align-items:center;justify-content:space-between;margin:0 32px 16px;flex-wrap:wrap;gap:10px}
.view-badge{display:flex;align-items:center;gap:8px;background:rgba(232,184,75,.07);border:1px solid rgba(232,184,75,.2);border-radius:10px;padding:6px 14px;font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(–gold)}
.meta-display{font-size:12px;color:var(–muted);letter-spacing:.5px}

/* SCOREBOARD */
.scoreboard{margin:0 32px 18px;background:rgba(15,32,64,.72);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:28px;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.08)}
.match-header{display:flex;justify-content:space-between;align-items:center;padding:12px 24px;background:linear-gradient(90deg,rgba(30,77,154,.9),rgba(22,45,87,.9));border-bottom:1px solid rgba(255,255,255,.07)}
.match-league{font-family:‘Oswald’,sans-serif;font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(–gold)}
.match-half{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.5)}
.scores-row{display:grid;grid-template-columns:1fr 80px 1fr;align-items:center;padding:32px 24px 16px;gap:12px}
.team-col{text-align:center}
.team-name-display{font-family:‘Oswald’,sans-serif;font-size:22px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(–white);margin-bottom:10px;line-height:1.1}

/* ODOMETER SCORE */
.score-slot{height:120px;overflow:hidden;display:flex;align-items:center;justify-content:center}
.score-drum{display:flex;flex-direction:column;transition:transform .5s cubic-bezier(.22,1,.36,1)}
.score-digit{font-family:‘Oswald’,sans-serif;font-size:120px;font-weight:700;line-height:1;text-align:center;height:120px;display:flex;align-items:center;justify-content:center;text-shadow:0 0 60px rgba(255,255,255,.1)}
.score-digit.col-lead{color:var(–gold);text-shadow:0 0 50px rgba(232,184,75,.4)}
.score-digit.col-lose{color:var(–muted)}
.score-digit.col-tie{color:var(–white)}

.score-ring{position:absolute;inset:-10px;border-radius:50%;border:3px solid var(–gold);opacity:0;pointer-events:none}
.score-ring.fire{animation:ringPop .6s ease-out forwards}
@keyframes ringPop{0%{opacity:.9;transform:scale(.6)}100%{opacity:0;transform:scale(1.8)}}
.score-wrap{position:relative;display:inline-block}
.score-sep{font-family:‘Oswald’,sans-serif;font-size:52px;font-weight:300;color:rgba(255,255,255,.2);text-align:center;line-height:1}

.shots-display{font-size:13px;color:var(–muted);letter-spacing:.5px;margin-top:4px;min-height:20px}
.shots-display span{color:var(–off-white);font-weight:600}
.cards-display{display:flex;justify-content:center;gap:6px;margin-top:8px;min-height:28px;flex-wrap:wrap}
.card-chip-view{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;font-size:13px;font-weight:700}
.cyellow{background:var(–yellow-card);color:#1a1200}
.cred{background:var(–red-card);color:white}

/* DIFF BANNER */
.diff-banner{margin:0 32px 18px;border-radius:14px;padding:10px 20px;text-align:center;font-family:‘Oswald’,sans-serif;font-size:15px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;transition:all .4s;border:1px solid transparent}
.diff-banner.lead{background:rgba(232,184,75,.1);border-color:rgba(232,184,75,.25);color:var(–gold)}
.diff-banner.trail{background:rgba(217,64,64,.08);border-color:rgba(217,64,64,.2);color:#e06060}
.diff-banner.tied{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1);color:var(–muted)}

/* TIMER */
.timer-card{margin:0 32px 18px;background:rgba(15,32,64,.72);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:24px 32px;box-shadow:0 8px 32px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.07);text-align:center}
.timer-label-text{font-family:‘Oswald’,sans-serif;font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(–muted);margin-bottom:10px}
.timer-digits{font-family:‘Oswald’,sans-serif;font-size:100px;font-weight:700;letter-spacing:6px;line-height:1;color:var(–white);transition:color .3s;text-shadow:0 0 50px rgba(255,255,255,.08)}
.timer-digits.warning{color:var(–gold);text-shadow:0 0 40px rgba(232,184,75,.3)}
.timer-digits.urgent{color:var(–red);animation:flash 1s infinite;text-shadow:0 0 40px rgba(217,64,64,.4)}
@keyframes flash{0%,100%{opacity:1}50%{opacity:.5}}

/* GOALS */
.section{margin:0 32px 18px}
.sec-label{font-family:‘Oswald’,sans-serif;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(–muted);margin-bottom:10px;padding-left:2px}
.goals-card{background:rgba(15,32,64,.65);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.08);border-radius:20px;overflow:hidden}
.goal-item{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid rgba(255,255,255,.05);animation:fadeSlide .4s ease}
@keyframes fadeSlide{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.goal-item:last-child{border-bottom:none}
.goal-badge{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.goal-badge.ours{background:rgba(37,97,196,.35)}
.goal-badge.theirs{background:rgba(255,255,255,.07)}
.goal-info{flex:1;min-width:0}
.goal-scorer{font-size:15px;font-weight:600;color:var(–white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.goal-team{font-size:12px;color:var(–muted);margin-top:1px}
.goal-time{font-family:‘Oswald’,sans-serif;font-size:16px;color:var(–gold);letter-spacing:.5px;flex-shrink:0}
.empty-goals{text-align:center;padding:32px 20px;color:var(–muted);font-size:14px;line-height:1.7}
.empty-goals span{font-size:30px;display:block;margin-bottom:8px}
.loading-state{text-align:center;padding:80px 20px;color:var(–muted);font-size:14px}
.loading-state span{font-size:36px;display:block;margin-bottom:14px}

/* HALFTIME OVERLAY */
.halftime-overlay{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,12,28,.92);backdrop-filter:blur(20px);opacity:0;pointer-events:none;transition:opacity .4s}
.halftime-overlay.show{opacity:1;pointer-events:auto}
.ht-label{font-family:‘Oswald’,sans-serif;font-size:13px;letter-spacing:5px;text-transform:uppercase;color:var(–gold);opacity:.8;margin-bottom:16px;animation:htFadeUp .6s ease .2s both}
.ht-banner{font-family:‘Oswald’,sans-serif;font-size:64px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(–white);margin-bottom:24px;animation:htFadeUp .6s ease .35s both}
.ht-score{font-family:‘Oswald’,sans-serif;font-size:100px;font-weight:700;color:var(–white);letter-spacing:10px;animation:htFadeUp .6s ease .5s both;text-shadow:0 0 60px rgba(232,184,75,.3)}
.ht-teams{font-family:‘Oswald’,sans-serif;font-size:18px;letter-spacing:2px;color:var(–muted);margin-top:10px;animation:htFadeUp .6s ease .6s both}
@keyframes htFadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* GOAL FX */
.goal-flash{position:fixed;inset:0;z-index:250;pointer-events:none;opacity:0}
.goal-flash.fire{animation:flashBurst .5s ease-out forwards}
@keyframes flashBurst{0%{opacity:.6;background:radial-gradient(circle,rgba(232,184,75,.5) 0%,transparent 70%)}100%{opacity:0}}
canvas#confetti{position:fixed;inset:0;z-index:249;pointer-events:none}
.footer-mark{text-align:center;padding:8px 0 4px;font-family:‘Oswald’,sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.12)}
</style>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

const FB={
  apiKey:"AIzaSyADA83VqTnTZYawJZEdnAMNzVOgq92PodQ",
  authDomain:"surf-score-2.firebaseapp.com",
  databaseURL:"https://surf-score-2-default-rtdb.firebaseio.com",
  projectId:"surf-score-2",
  storageBucket:"surf-score-2.firebasestorage.app",
  messagingSenderId:"1066375405954",
  appId:"1:1066375405954:web:552acd57a7d66243806f9b"
};

let S=null,prevHome=0,prevAway=0,prevHalf=1,viewTicker=null;

const fbApp=initializeApp(FB);
const db=getDatabase(fbApp);
const gameRef=ref(db,'surfmatchday/game');

setSyncStatus('connecting');
onValue(gameRef,snap=>{
  const d=snap.val();
  if(!d){setSyncStatus('live');return;}
  document.getElementById('loadingState').style.display='none';
  document.getElementById('mainContent').style.display='';

  const goalHome=S&&d.homeScore>prevHome;
  const goalAway=S&&d.awayScore>prevAway;
  const halfChanged=S&&d.half!==prevHalf;

  if(goalHome)fireGoalCelebration('home');
  if(goalAway)fireGoalCelebration('away');
  if(halfChanged)showHalftimeOverlay(d);

  prevHome=d.homeScore||0;prevAway=d.awayScore||0;prevHalf=d.half||1;
  S=d;renderAll();setSyncStatus('live');

  if(S.timerRunning&&!viewTicker){
    viewTicker=setInterval(()=>{
      if(!S||!S.timerRunning){clearInterval(viewTicker);viewTicker=null;return;}
      if(S.clockUp){S.elapsedSec=(S.elapsedSec||0)+1;}
      else if(S.timerSec>0){S.timerSec--;}
      renderTimerOnly();
    },1000);
  } else if(!S.timerRunning&&viewTicker){
    clearInterval(viewTicker);viewTicker=null;
  }
},()=>setSyncStatus('error'));

function setSyncStatus(s){
  const w=document.getElementById('syncWrap'),l=document.getElementById('syncLabel');
  w.className='sync-wrap';
  const lb=document.getElementById('liveBadge');
  if(s==='live'){
    w.classList.add('live');l.textContent='LIVE';
    lb.style.display='flex';
  } else if(s==='error'){
    w.classList.add('error');l.textContent='ERROR';
    lb.style.display='none';
  } else {
    l.textContent='SYNC…';lb.style.display='none';
  }
}

function fireGoalCelebration(team){
  const ring=document.getElementById(team==='home'?'homeRing':'awayRing');
  ring.classList.add('fire');setTimeout(()=>ring.classList.remove('fire'),600);
  document.getElementById('goalFlash').classList.add('fire');
  setTimeout(()=>document.getElementById('goalFlash').classList.remove('fire'),500);
  launchConfetti();
}

function showHalftimeOverlay(d){
  const ov=document.getElementById('htOverlay');
  document.getElementById('htBanner').textContent=(d.half||1)===2?'2ND HALF':'FULL TIME';
  document.getElementById('htScore').textContent=`${d.homeScore||0} : ${d.awayScore||0}`;
  document.getElementById('htTeams').textContent=`${(d.homeTeam||'SDSC SURF').toUpperCase()} vs ${(d.awayTeam||'OPPONENT').toUpperCase()}`;
  ov.classList.add('show');setTimeout(()=>ov.classList.remove('show'),4000);
}

function renderTimerOnly(){
  if(!S)return;
  let sec,txt;
  if(S.clockUp){
    sec=S.elapsedSec||0;
  } else {
    sec=S.timerSec??0;
  }
  const m=Math.floor(sec/60),s=sec%60;
  txt=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const el=document.getElementById('timerDigits');
  el.textContent=txt;el.className='timer-digits';
  if(!S.clockUp){
    if(sec<=60)el.classList.add('urgent');
    else if(sec<=300)el.classList.add('warning');
  }
}

function animateScore(drumId,newVal,colorClass){
  const drum=document.getElementById(drumId);
  const digits=[];for(let i=0;i<=newVal;i++)digits.push(i);
  drum.innerHTML=digits.map((d,i)=>`<div class="score-digit ${i===digits.length-1?colorClass:'col-tie'}">${d}</div>`).join('');
  drum.style.transition='none';drum.style.transform='translateY(0)';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    drum.style.transition='transform .5s cubic-bezier(.22,1,.36,1)';
    drum.style.transform=`translateY(-${(digits.length-1)*120}px)`;
  }));
}

function renderAll(){
  if(!S)return;
  const h=S.homeScore||0,a=S.awayScore||0;
  animateScore('homeDrum',h,h>a?'col-lead':h<a?'col-lose':'col-tie');
  animateScore('awayDrum',a,a>h?'col-lead':a<h?'col-lose':'col-tie');

  document.getElementById('homeLabel').textContent=(S.homeTeam||'SDSC Surf').toUpperCase();
  document.getElementById('awayLabel').textContent=(S.awayTeam||'Opponent').toUpperCase();

  const half=S.half||1,halfLbl=half===1?'1ST HALF':'2ND HALF';
  document.getElementById('halfBadge').textContent=halfLbl;
  document.getElementById('timerHalfLabel').textContent=halfLbl;
  renderTimerOnly();

  // Diff banner
  const db2=document.getElementById('diffBanner');
  if(h>a){db2.className='diff-banner lead';db2.textContent=`SURF LEAD · ${h} – ${a}`;}
  else if(a>h){db2.className='diff-banner trail';db2.textContent=`SURF TRAIL · ${h} – ${a}`;}
  else{db2.className='diff-banner tied';db2.textContent=`LEVEL · ${h} – ${a}`;}

  // Shots
  document.getElementById('homeShots').innerHTML=S.homeShots>0?`<span>${S.homeShots}</span> shots`:'';
  document.getElementById('awayShots').innerHTML=S.awayShots>0?`<span>${S.awayShots}</span> shots`:'';

  // Cards
  function cardsHtml(y,r){
    let html='';
    if(y>0)html+=`<div class="card-chip-view cyellow">🟨 ${y}</div>`;
    if(r>0)html+=`<div class="card-chip-view cred">🟥 ${r}</div>`;
    return html;
  }
  document.getElementById('homeCards').innerHTML=cardsHtml(S.homeYellow||0,S.homeRed||0);
  document.getElementById('awayCards').innerHTML=cardsHtml(S.awayYellow||0,S.awayRed||0);

  // Meta
  const meta=[];
  if(S.metaDate)meta.push(S.metaDate);
  if(S.metaLocation)meta.push(S.metaLocation);
  document.getElementById('metaDisplay').textContent=meta.join(' · ');

  // Goals
  const goals=S.goals||[];
  const list=document.getElementById('goalsList');
  if(!goals.length){list.innerHTML='<div class="empty-goals"><span>⚽</span>No goals yet</div>';return;}
  list.innerHTML=[...goals].reverse().map(g=>`
    <div class="goal-item">
      <div class="goal-badge ${g.team==='home'?'ours':'theirs'}">${g.team==='home'?'⚽':'🔵'}</div>
      <div class="goal-info">
        <div class="goal-scorer">${g.scorer}</div>
        <div class="goal-team">${g.team==='home'?(S.homeTeam||'SDSC Surf'):(S.awayTeam||'Opponent')}</div>
      </div>
      <div class="goal-time">${g.time}</div>
    </div>`).join('');
}

function launchConfetti(){
  const canvas=document.getElementById('confetti');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const colors=['#e8b84b','#f4f7ff','#2561c4','#3dd68c','#ffffff'];
  const particles=Array.from({length:100},()=>({
    x:Math.random()*canvas.width,y:Math.random()*canvas.height*.4,
    vx:(Math.random()-.5)*10,vy:Math.random()*5+2,size:Math.random()*8+3,
    color:colors[Math.floor(Math.random()*colors.length)],
    rot:Math.random()*360,rotV:(Math.random()-.5)*10,alpha:1,
    shape:Math.random()>.5?'rect':'circle'
  }));
  let frame=0;
  (function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.vy+=.18;p.rot+=p.rotV;p.alpha-=.011;
      if(p.alpha<=0)return;
      ctx.save();ctx.globalAlpha=p.alpha;ctx.fillStyle=p.color;
      ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
      if(p.shape==='rect')ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*.6);
      else{ctx.beginPath();ctx.arc(0,0,p.size/2,0,Math.PI*2);ctx.fill();}
      ctx.restore();
    });
    if(++frame<130)requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  })();
}
